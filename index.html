<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças 360 - Controle Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .confirmed { border-left: 4px solid #10b981 !important; background-color: #f0fdf4; }
        .pending { border-left: 4px solid #f59e0b !important; background-color: #fffbeb; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <nav class="bg-slate-800 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold italic text-blue-400">FINANÇAS 360 v2</h1>
                <select id="filtro-ano" onchange="changeYear()" class="bg-slate-700 text-white rounded px-2 py-1 border-none outline-none font-bold text-lg">
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                    <option value="2028">2028</option>
                </select>
            </div>
            <div class="flex gap-4">
                <button onclick="showTab('dashboard')" class="hover:text-blue-400 font-medium transition">Dashboard</button>
                <button onclick="showTab('config')" class="hover:text-blue-400 font-medium transition">Lançamentos</button>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 px-3 py-1 rounded text-sm transition">Excel</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        
        <section id="dashboard" class="tab-content active space-y-6">
            <div id="cards-resumo" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>

            <div class="bg-white rounded-lg shadow overflow-hidden border">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-slate-50 text-slate-500 uppercase text-xs font-bold">
                            <tr>
                                <th class="px-4 py-3 border-b text-left">Mês</th>
                                <th class="px-4 py-3 border-b">Previsto Entrada</th>
                                <th class="px-4 py-3 border-b text-green-700 bg-green-50">Realizado Entrada</th>
                                <th class="px-4 py-3 border-b">Previsto Saída</th>
                                <th class="px-4 py-3 border-b text-red-700 bg-red-50">Realizado Saída</th>
                                <th class="px-4 py-3 border-b bg-gray-100">Saldo Realizado</th>
                            </tr>
                        </thead>
                        <tbody id="dashboard-body" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-lg shadow border"><canvas id="chartEvolucao"></canvas></div>
                <div class="bg-white p-4 rounded-lg shadow border"><canvas id="chartPrevVsReal"></canvas></div>
            </div>
        </section>

        <section id="config" class="tab-content space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <div class="bg-white p-5 rounded-xl shadow border">
                    <h2 class="font-bold text-blue-600 mb-4 uppercase text-xs">A. Entradas (Renda)</h2>
                    <div class="grid gap-2 mb-4 p-3 bg-gray-50 rounded-lg border border-dashed">
                        <input type="text" id="ent-desc" placeholder="Ex: Salário, Freela" class="border p-2 rounded w-full">
                        <div class="flex gap-2">
                            <input type="number" id="ent-val" placeholder="R$" class="w-1/2 border p-2 rounded">
                            <select id="ent-tipo" class="w-1/2 border p-2 rounded" onchange="toggleExtra('ent')">
                                <option value="recorrente">Recorrente Mensal</option>
                                <option value="pontual">Pontual</option>
                            </select>
                        </div>
                        <div id="ent-extra" class="hidden"><select id="ent-mes" class="w-full border p-2 rounded"></select></div>
                        <button onclick="addEntry('entradas')" class="bg-blue-600 text-white p-2 rounded font-bold hover:bg-blue-700">+ ADICIONAR</button>
                    </div>
                    <ul id="list-entradas" class="space-y-2"></ul>
                </div>

                <div class="bg-white p-5 rounded-xl shadow border">
                    <h2 class="font-bold text-red-600 mb-4 uppercase text-xs">B. Despesas Fixas (Mensais)</h2>
                    <div class="flex gap-2 mb-4 p-3 bg-gray-50 rounded-lg border border-dashed">
                        <input type="text" id="fix-desc" placeholder="Aluguel, Internet..." class="flex-1 border p-2 rounded">
                        <input type="number" id="fix-val" placeholder="R$" class="w-24 border p-2 rounded">
                        <button onclick="addEntry('fixas')" class="bg-red-500 text-white px-4 rounded font-bold hover:bg-red-600">+</button>
                    </div>
                    <ul id="list-fixas" class="space-y-2"></ul>
                </div>

                <div class="bg-white p-5 rounded-xl shadow border">
                    <h2 class="font-bold text-orange-600 mb-4 uppercase text-xs">C. Saídas Variáveis</h2>
                    <div class="grid gap-2 mb-4 p-3 bg-gray-50 rounded-lg border border-dashed">
                        <input type="text" id="var-desc" placeholder="Ex: Supermercado, Uber" class="border p-2 rounded w-full">
                        <div class="flex gap-2">
                            <input type="number" id="var-val" placeholder="R$" class="w-1/2 border p-2 rounded">
                            <select id="var-tipo" class="w-1/2 border p-2 rounded" onchange="toggleExtra('var')">
                                <option value="recorrente">Média Mensal</option>
                                <option value="pontual">Pontual</option>
                            </select>
                        </div>
                        <div id="var-extra" class="hidden"><select id="var-mes" class="w-full border p-2 rounded"></select></div>
                        <button onclick="addEntry('variaveis')" class="bg-orange-500 text-white p-2 rounded font-bold hover:bg-orange-600">+ ADICIONAR</button>
                    </div>
                    <ul id="list-variaveis" class="space-y-2"></ul>
                </div>

                <div class="bg-white p-5 rounded-xl shadow border">
                    <h2 class="font-bold text-purple-600 mb-4 uppercase text-xs">D. Dívidas e Parcelados (Com Fim)</h2>
                    <div class="grid gap-2 mb-4 p-3 bg-gray-50 rounded-lg border border-dashed">
                        <input type="text" id="det-desc" placeholder="Ex: Notebook, Empréstimo" class="border p-2 rounded w-full text-sm">
                        <div class="flex gap-2">
                            <input type="number" id="det-total" placeholder="Total R$" class="w-1/3 border p-2 rounded text-sm">
                            <input type="number" id="det-parc" placeholder="Parc." class="w-1/4 border p-2 rounded text-sm">
                            <select id="det-inicio" class="w-1/3 border p-2 rounded text-sm"></select>
                        </div>
                        <button onclick="addTerminavel()" class="bg-purple-600 text-white p-2 rounded font-bold text-sm hover:bg-purple-700">+ ADICIONAR PARCELAMENTO</button>
                    </div>
                    <ul id="list-determinadas" class="space-y-2"></ul>
                </div>

            </div>
            <div class="text-center p-8">
                <button onclick="resetData()" class="text-red-400 text-xs font-bold uppercase hover:underline">Limpar Banco de Dados</button>
            </div>
        </section>
    </main>

    <script>
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        let currentYear = 2026;
        
        let state = JSON.parse(localStorage.getItem('financas_pro_360_v3')) || {
            entradas: [], fixas: [], variaveis: [], determinadas: []
        };

        // Popular selects
        document.querySelectorAll('#ent-mes, #var-mes, #det-inicio').forEach(s => {
            meses.forEach((m, i) => s.innerHTML += `<option value="${i}">${m}</option>`);
        });

        function toggleExtra(prefix) {
            const val = document.getElementById(`${prefix}-tipo`).value;
            document.getElementById(`${prefix}-extra`).style.display = val === 'pontual' ? 'block' : 'none';
        }

        function save() {
            localStorage.setItem('financas_pro_360_v3', JSON.stringify(state));
            renderAll();
        }

        function addEntry(type) {
            const prefix = type === 'entradas' ? 'ent' : type === 'variaveis' ? 'var' : 'fix';
            const desc = document.getElementById(`${prefix}-desc`).value;
            const val = parseFloat(document.getElementById(`${prefix}-val`).value);
            const tipo = document.getElementById(`${prefix}-tipo`)?.value || 'recorrente';
            const mes = parseInt(document.getElementById(`${prefix}-mes`)?.value || 0);

            if(desc && val) {
                state[type].push({ id: Date.now(), desc, val, tipo, mes: tipo === 'recorrente' ? -1 : mes, ano: currentYear, status: 'previsto' });
                save();
                document.getElementById(`${prefix}-desc`).value = '';
                document.getElementById(`${prefix}-val`).value = '';
            }
        }

        function addTerminavel() {
            const desc = document.getElementById('det-desc').value;
            const total = parseFloat(document.getElementById('det-total').value);
            const parc = parseInt(document.getElementById('det-parc').value);
            const inicio = parseInt(document.getElementById('det-inicio').value);

            if(desc && total && parc) {
                state.determinadas.push({ id: Date.now(), desc, total, parc, inicio, ano: currentYear, status: 'previsto' });
                save();
                document.getElementById('det-desc').value = '';
                document.getElementById('det-total').value = '';
                document.getElementById('det-parc').value = '';
            }
        }

        function toggleStatus(type, id) {
            const item = state[type].find(i => i.id === id);
            item.status = item.status === 'previsto' ? 'pago' : 'previsto';
            save();
        }

        function removeItem(type, id) {
            state[type] = state[type].filter(i => i.id !== id);
            save();
        }

        function getMensalData(mesIdx) {
            const filtrar = (arr) => arr.filter(i => (i.tipo === 'recorrente' || (i.mes === mesIdx && i.ano === currentYear)));
            
            // Lógica especial para parcelados
            const calcDet = (status) => state.determinadas.reduce((acc, i) => {
                const mesFim = i.inicio + i.parc;
                if (mesIdx >= i.inicio && mesIdx < mesFim && i.ano === currentYear) {
                    return (status === 'all' || i.status === status) ? acc + (i.total / i.parc) : acc;
                }
                return acc;
            }, 0);

            const ent = filtrar(state.entradas);
            const saiRec = [...filtrar(state.fixas), ...filtrar(state.variaveis)];

            return {
                entPrev: ent.reduce((a, b) => a + b.val, 0),
                entReal: ent.filter(i => i.status === 'pago').reduce((a, b) => a + b.val, 0),
                saiPrev: saiRec.reduce((a, b) => a + b.val, 0) + calcDet('all'),
                saiReal: saiRec.filter(i => i.status === 'pago').reduce((a, b) => a + b.val, 0) + calcDet('pago')
            };
        }

        function renderLists() {
            const renderItem = (type, i) => `
                <li class="flex justify-between items-center p-2 rounded shadow-sm border ${i.status === 'pago' ? 'confirmed' : 'pending'}">
                    <div class="text-[10px] md:text-xs">
                        <span class="font-bold uppercase block">${i.desc}</span>
                        <span class="text-gray-400">${i.tipo === 'recorrente' ? 'Mensal' : i.parc ? i.parc+'x' : meses[i.mes]}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-xs">R$ ${(i.val || i.total/i.parc).toFixed(2)}</span>
                        <button onclick="toggleStatus('${type}', ${i.id})">${i.status === 'pago' ? '✅' : '⏳'}</button>
                        <button onclick="removeItem('${type}', ${i.id})" class="text-red-300 hover:text-red-600">×</button>
                    </div>
                </li>`;

            ['entradas', 'variaveis', 'fixas', 'determinadas'].forEach(type => {
                const list = document.getElementById(`list-${type === 'determinadas' ? 'determinadas' : type}`);
                list.innerHTML = state[type].filter(i => i.ano === currentYear || i.tipo === 'recorrente').map(i => renderItem(type, i)).join('');
            });
        }

        function renderDashboard() {
            const tbody = document.getElementById('dashboard-body');
            tbody.innerHTML = '';
            const dadosAno = meses.map((_, idx) => getMensalData(idx));

            dadosAno.forEach((d, i) => {
                const saldo = d.entReal - d.saiReal;
                tbody.innerHTML += `
                    <tr>
                        <td class="px-4 py-2 font-bold bg-gray-50">${meses[i]}</td>
                        <td class="px-4 py-2 text-center text-gray-400 italic">R$ ${d.entPrev.toFixed(2)}</td>
                        <td class="px-4 py-2 text-center text-green-600 font-bold bg-green-50">R$ ${d.entReal.toFixed(2)}</td>
                        <td class="px-4 py-2 text-center text-gray-400 italic">R$ ${d.saiPrev.toFixed(2)}</td>
                        <td class="px-4 py-2 text-center text-red-600 font-bold bg-red-50">R$ ${d.saiReal.toFixed(2)}</td>
                        <td class="px-4 py-2 font-bold text-center ${saldo < 0 ? 'text-red-600' : 'text-blue-600'}">R$ ${saldo.toFixed(2)}</td>
                    </tr>`;
            });

            const realEnt = dadosAno.reduce((a,b)=>a+b.entReal,0);
            const realSai = dadosAno.reduce((a,b)=>a+b.saiReal,0);
            
            document.getElementById('cards-resumo').innerHTML = `
                <div class="bg-indigo-600 text-white p-4 rounded-lg shadow-md">
                    <p class="text-[10px] opacity-80 uppercase">Saldo Real Total (${currentYear})</p>
                    <p class="text-xl font-bold">R$ ${(realEnt - realSai).toFixed(2)}</p>
                </div>
                <div class="bg-white p-4 rounded-lg border">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Realizado Entrada</p>
                    <p class="text-xl font-bold text-green-600">R$ ${realEnt.toFixed(2)}</p>
                </div>
                <div class="bg-white p-4 rounded-lg border">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Realizado Saída</p>
                    <p class="text-xl font-bold text-red-600">R$ ${realSai.toFixed(2)}</p>
                </div>
                <div class="bg-white p-4 rounded-lg border">
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Planejado Restante</p>
                    <p class="text-xl font-bold text-amber-500">R$ ${dadosAno.reduce((a,b)=>a+(b.entPrev - b.entReal),0).toFixed(2)}</p>
                </div>`;
            updateCharts(dadosAno);
        }

        let chart1, chart2;
        function updateCharts(dados) {
            const ctx1 = document.getElementById('chartEvolucao').getContext('2d');
            if(chart1) chart1.destroy();
            chart1 = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: meses.map(m => m.substring(0,3)),
                    datasets: [{ label: 'Saldo Real', data: dados.map(d => d.entReal - d.saiReal), borderColor: '#4f46e5', tension: 0.3 }]
                }
            });
            const ctx2 = document.getElementById('chartPrevVsReal').getContext('2d');
            if(chart2) chart2.destroy();
            chart2 = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: ['Entradas', 'Saídas'],
                    datasets: [
                        { label: 'Previsto', data: [dados.reduce((a,b)=>a+b.entPrev,0), dados.reduce((a,b)=>a+b.saiPrev,0)], backgroundColor: '#e2e8f0' },
                        { label: 'Realizado', data: [dados.reduce((a,b)=>a+b.entReal,0), dados.reduce((a,b)=>a+b.saiReal,0)], backgroundColor: '#4f46e5' }
                    ]
                }
            });
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function changeYear() {
            currentYear = parseInt(document.getElementById('filtro-ano').value);
            renderAll();
        }

        function resetData() { if(confirm("Apagar tudo?")) { localStorage.removeItem('financas_pro_360_v3'); location.reload(); } }

        function renderAll() { renderLists(); renderDashboard(); }
        renderAll();
    </script>
</body>
</html>
