<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças 360 v3 - Resgate de Dados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .bg-pago { background-color: #f0fdf4; border-left: 4px solid #10b981; }
        .bg-pendente { background-color: #ffffff; border-left: 4px solid #e2e8f0; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="bg-slate-800 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold italic text-blue-400">FINANÇAS 360 v3</h1>
                <select id="filtro-ano" onchange="renderAll()" class="bg-slate-700 text-white rounded px-2 py-1 font-bold outline-none">
                    <option value="2025">2025</option>
                    <option value="2026" selected>2026</option>
                    <option value="2027">2027</option>
                </select>
            </div>
            <div class="flex gap-4 font-medium">
                <button onclick="showTab('dashboard')" class="hover:text-blue-400 transition">Dashboard</button>
                <button onclick="showTab('config')" class="hover:text-blue-400 transition">Lançamentos</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-6">
        <section id="dashboard" class="tab-content active space-y-6">
            <div id="cards-resumo" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            <div class="bg-white rounded-xl shadow-md border overflow-hidden">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 text-slate-500 uppercase text-[10px] font-bold">
                        <tr>
                            <th class="px-6 py-4 border-b">Mês</th>
                            <th class="px-6 py-4 border-b">Entradas (Renda)</th>
                            <th class="px-6 py-4 border-b">Saídas (Despesas)</th>
                            <th class="px-6 py-4 border-b bg-gray-50">Saldo Realizado</th>
                        </tr>
                    </thead>
                    <tbody id="dashboard-body" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </section>

        <section id="config" class="tab-content space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border">
                    <h2 class="font-bold text-blue-600 mb-6 uppercase text-xs">📥 Nova Renda</h2>
                    <div class="space-y-3 p-4 bg-blue-50 rounded-xl mb-6">
                        <input type="text" id="ent-desc" placeholder="Nome" class="w-full border p-2 rounded">
                        <div class="flex gap-2">
                            <input type="number" id="ent-val" placeholder="R$" class="w-1/2 border p-2 rounded">
                            <select id="ent-tipo" class="w-1/2 border p-2 rounded" onchange="toggleMes('ent')">
                                <option value="recorrente">Recorrente</option>
                                <option value="pontual">Pontual</option>
                            </select>
                        </div>
                        <div id="ent-mes-div" class="hidden"><select id="ent-mes" class="w-full border p-2 rounded"></select></div>
                        <button onclick="addEntry('entradas')" class="w-full bg-blue-600 text-white p-3 rounded font-bold hover:bg-blue-700 transition">SALVAR</button>
                    </div>
                    <ul id="list-entradas" class="space-y-2"></ul>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border">
                    <h2 class="font-bold text-red-600 mb-6 uppercase text-xs">📤 Nova Despesa</h2>
                    <div class="space-y-3 p-4 bg-red-50 rounded-xl mb-6">
                        <input type="text" id="sai-desc" placeholder="Nome" class="w-full border p-2 rounded">
                        <div class="flex gap-2">
                            <input type="number" id="sai-val" placeholder="R$" class="w-1/2 border p-2 rounded">
                            <select id="sai-tipo" class="w-1/2 border p-2 rounded" onchange="toggleMes('sai')">
                                <option value="recorrente">Recorrente</option>
                                <option value="pontual">Pontual</option>
                            </select>
                        </div>
                        <div id="sai-mes-div" class="hidden"><select id="sai-mes" class="w-full border p-2 rounded"></select></div>
                        <button onclick="addEntry('despesas')" class="w-full bg-red-600 text-white p-3 rounded font-bold hover:bg-red-700 transition">SALVAR</button>
                    </div>
                    <ul id="list-despesas" class="space-y-2"></ul>
                </div>
            </div>
        </section>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z- p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border">
            <div id="modal-header" class="p-6 text-white font-bold flex justify-between items-center">
                <span id="modal-title">Detalhes</span>
                <button onclick="closeModal()">✕</button>
            </div>
            <div id="modal-body" class="p-6 max-h-[50vh] overflow-y-auto space-y-3 bg-slate-50"></div>
            <div class="p-4 bg-white border-t flex justify-between items-center">
                <span id="modal-footer-sum" class="font-bold text-sm"></span>
                <button onclick="closeModal()" class="px-6 py-2 bg-slate-800 text-white rounded-lg font-bold text-xs">OK</button>
            </div>
        </div>
    </div>

    <script>
        const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        // RESGATE DE DADOS: O código agora lê TODAS as chaves antigas
        let storageV2 = JSON.parse(localStorage.getItem('financas_pro_360_v2')) || {};
        let storageV3 = JSON.parse(localStorage.getItem('financas_pro_360_v3')) || {};

        let state = {
            entradas: storageV3.entradas || storageV2.entradas || [],
            despesas: storageV3.despesas || [
                ...(storageV2.fixas || []),
                ...(storageV2.variaveis || []),
                ...(storageV2.determinadas || [])
            ],
            pagas: storageV3.pagas || {}
        };

        // Migração para garantir que o formato 'despesas' seja respeitado
        state.despesas = state.despesas.map(i => {
            if (i.total && i.parc) return { ...i, val: i.total / i.parc, tipo: 'determinada' };
            if (!i.tipo) return { ...i, tipo: 'recorrente' };
            return i;
        });

        document.querySelectorAll('#ent-mes, #sai-mes').forEach(s => {
            meses.forEach((m, i) => s.innerHTML += `<option value="${i}">${m}</option>`);
        });

        function toggleMes(prefix) {
            const val = document.getElementById(`${prefix}-tipo`).value;
            document.getElementById(`${prefix}-mes-div`).style.display = (val === 'pontual') ? 'block' : 'none';
        }

        function save() {
            localStorage.setItem('financas_pro_360_v3', JSON.stringify(state));
            renderAll();
        }

        function addEntry(type) {
            const prefix = type === 'entradas' ? 'ent' : 'sai';
            const desc = document.getElementById(`${prefix}-desc`).value;
            const val = parseFloat(document.getElementById(`${prefix}-val`).value);
            const tipo = document.getElementById(`${prefix}-tipo`).value;
            const mesSel = parseInt(document.getElementById(`${prefix}-mes`).value);
            const ano = parseInt(document.getElementById('filtro-ano').value);

            if(desc && val) {
                state[type === 'entradas' ? 'entradas' : 'despesas'].push({
                    id: 'ID' + Date.now(), desc, val, tipo,
                    mesCriacao: tipo === 'recorrente' ? -1 : mesSel,
                    anoCriacao: ano
                });
                save();
                document.getElementById(`${prefix}-desc`).value = '';
                document.getElementById(`${prefix}-val`).value = '';
            }
        }

        function removeItem(type, id) {
            if(confirm("Excluir item?")) {
                state[type] = state[type].filter(i => i.id !== id);
                save();
            }
        }

        function toggleBaixa(id, mesIdx, ano) {
            const key = `${id}_${mesIdx}_${ano}`;
            state.pagas[key] = !state.pagas[key];
            save();
            openModal(mesIdx, window.currentModalType);
        }

        function getValoresMes(mesIdx, ano) {
            const filtrar = (list) => list.filter(i => {
                if (i.tipo === 'pontual') return i.mesCriacao === mesIdx && i.anoCriacao === ano;
                if (i.tipo === 'determinada') {
                    const mesFim = i.inicio + i.parc;
                    return mesIdx >= i.inicio && mesIdx < mesFim && i.ano === ano;
                }
                // Regra Abril/2026
                if (ano === 2026) return mesIdx >= 3;
                return ano > 2026;
            });

            const calc = (lista) => lista.reduce((acc, i) => {
                const valor = i.val || (i.total / i.parc);
                acc.prev += valor;
                if (state.pagas[`${i.id}_${mesIdx}_${ano}`]) acc.real += valor;
                return acc;
            }, { prev: 0, real: 0, items: lista });

            return {
                entradas: calc(filtrar(state.entradas)),
                saidas: calc(filtrar(state.despesas))
            };
        }

        function renderDashboard() {
            const ano = parseInt(document.getElementById('filtro-ano').value);
            const tbody = document.getElementById('dashboard-body');
            tbody.innerHTML = '';
            let tEnt = 0, tSai = 0;

            meses.forEach((mes, i) => {
                const d = getValoresMes(i, ano);
                const saldo = d.entradas.real - d.saidas.real;
                tEnt += d.entradas.real; tSai += d.saidas.real;

                tbody.innerHTML += `
                    <tr>
                        <td class="px-6 py-4 font-bold">${mes}</td>
                        <td class="px-6 py-4 cursor-pointer hover:bg-green-50" onclick="openModal(${i}, 'entradas')">
                            <div class="text-[10px] text-gray-400 italic">Prev: R$ ${d.entradas.prev.toFixed(2)}</div>
                            <div class="text-green-600 font-bold underline underline-offset-4 decoration-dotted">Real: R$ ${d.entradas.real.toFixed(2)}</div>
                        </td>
                        <td class="px-6 py-4 cursor-pointer hover:bg-red-50" onclick="openModal(${i}, 'saidas')">
                            <div class="text-[10px] text-gray-400 italic">Prev: R$ ${d.saidas.prev.toFixed(2)}</div>
                            <div class="text-red-600 font-bold underline underline-offset-4 decoration-dotted">Real: R$ ${d.saidas.real.toFixed(2)}</div>
                        </td>
                        <td class="px-6 py-4 font-black text-lg ${saldo < 0 ? 'text-red-600' : 'text-blue-600'}">R$ ${saldo.toFixed(2)}</td>
                    </tr>`;
            });
            document.getElementById('cards-resumo').innerHTML = `
                <div class="bg-blue-600 text-white p-6 rounded-xl shadow-lg"><p class="text-[10px] uppercase opacity-70">Saldo Realizado</p><p class="text-2xl font-black">R$ ${(tEnt-tSai).toFixed(2)}</p></div>
                <div class="bg-white p-6 rounded-xl border shadow-sm"><p class="text-[10px] text-gray-400 uppercase font-bold">Total Recebido</p><p class="text-2xl font-bold text-green-600">R$ ${tEnt.toFixed(2)}</p></div>
                <div class="bg-white p-6 rounded-xl border shadow-sm"><p class="text-[10px] text-gray-400 uppercase font-bold">Total Pago</p><p class="text-2xl font-bold text-red-600">R$ ${tSai.toFixed(2)}</p></div>`;
        }

        function openModal(mesIdx, type) {
            window.currentModalType = type;
            const ano = parseInt(document.getElementById('filtro-ano').value);
            const modal = document.getElementById('modal');
            const body = document.getElementById('modal-body');
            const data = getValoresMes(mesIdx, ano)[type === 'entradas' ? 'entradas' : 'saidas'];
            
            modal.classList.remove('hidden');
            document.getElementById('modal-header').className = `p-6 text-white font-bold flex justify-between ${type === 'entradas' ? 'bg-green-600' : 'bg-red-600'}`;
            document.getElementById('modal-title').innerText = `${type === 'entradas' ? 'Receitas' : 'Despesas'} - ${meses[mesIdx]}`;
            document.getElementById('modal-footer-sum').innerText = `Total: R$ ${data.real.toFixed(2)}`;

            body.innerHTML = data.items.map(i => {
                const isP = state.pagas[`${i.id}_${mesIdx}_${ano}`];
                return `<div class="flex justify-between items-center p-4 rounded-xl border ${isP ? 'bg-pago' : 'bg-pendente'}">
                    <div><p class="font-bold text-xs uppercase">${i.desc}</p></div>
                    <div class="flex items-center gap-4"><span class="font-bold text-sm">R$ ${(i.val || i.total/i.parc).toFixed(2)}</span>
                    <button onclick="toggleBaixa('${i.id}', ${mesIdx}, ${ano})" class="text-2xl">${isP ? '✅' : '⬜'}</button></div>
                </div>`;
            }).join('') || '<p class="text-center text-gray-400 py-4 italic">Nenhum lançamento.</p>';
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); renderAll(); }
        function renderLists() {
            const ano = parseInt(document.getElementById('filtro-ano').value);
            const r = (type) => {
                document.getElementById(`list-${type === 'entradas' ? 'entradas' : 'despesas'}`).innerHTML = state[type === 'entradas' ? 'entradas' : 'despesas']
                    .filter(i => i.anoCriacao === ano || i.tipo === 'recorrente' || i.ano === ano)
                    .map(i => `<li class="flex justify-between items-center bg-white p-2 border rounded text-xs"><span>${i.desc}</span><button onclick="removeItem('${type === 'entradas' ? 'entradas' : 'despesas'}', '${i.id}')" class="text-red-400 font-bold px-2">×</button></li>`).join('');
            };
            r('entradas'); r('despesas');
        }
        function renderAll() { renderLists(); renderDashboard(); }
        renderAll();
    </script>
</body>
</html>
